name: CI/CD BodyTrack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-3
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  build:
    name: Build & Push Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Frontend
        run: |
          docker build \
            -t $ECR_REGISTRY/bodytrack/frontend:latest \
            -t $ECR_REGISTRY/bodytrack/frontend:${{ github.sha }} \
            ./frontend
          docker push $ECR_REGISTRY/bodytrack/frontend:latest
          docker push $ECR_REGISTRY/bodytrack/frontend:${{ github.sha }}

      - name: Build & push Backend
        run: |
          docker build \
            -t $ECR_REGISTRY/bodytrack/backend:latest \
            -t $ECR_REGISTRY/bodytrack/backend:${{ github.sha }} \
            ./backend
          docker push $ECR_REGISTRY/bodytrack/backend:latest
          docker push $ECR_REGISTRY/bodytrack/backend:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/home/ubuntu/bodytrack/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-west-3 | \
              docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}

            cd ~/bodytrack

            docker pull ${{ secrets.ECR_REGISTRY }}/bodytrack/frontend:latest
            docker pull ${{ secrets.ECR_REGISTRY }}/bodytrack/backend:latest

            export ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET=${{ secrets.JWT_SECRET }}
            export RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            export CRON_SECRET=${{ secrets.CRON_SECRET }}

            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d

            docker image prune -f

            echo "Containers running:"
            docker ps
