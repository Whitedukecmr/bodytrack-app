services:
  postgres:
    image: postgres:16-alpine
    container_name: bodytrack-postgres
    environment:
      - POSTGRES_USER=bodytrack
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=bodytrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    image: ${ECR_REGISTRY}/bodytrack/backend:latest
    container_name: bodytrack-backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=bodytrack
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=bodytrack
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    image: ${ECR_REGISTRY}/bodytrack/frontend:latest
    container_name: bodytrack-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
